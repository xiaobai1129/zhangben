<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>记账本 — 本地个人记账</title>
    <meta name="description" content="纯本地个人记账应用，数据安全存储在浏览器中">

    <!-- PWA & iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="记账本">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e1a">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <!-- ===== 顶栏 ===== -->
        <header class="top-bar">
            <h1 class="app-title">📒 记账本</h1>
            <button class="menu-btn" id="menu-btn">
                <span class="menu-icon">
                    <span></span><span></span><span></span>
                </span>
            </button>
        </header>

        <!-- ===== 下拉菜单 ===== -->
        <div class="dropdown-menu" id="dropdown-menu">
            <a href="#" class="dropdown-item" data-page="home">
                <span class="dropdown-icon">✏️</span>记账
            </a>
            <a href="#" class="dropdown-item" data-page="history">
                <span class="dropdown-icon">📋</span>历史账目
            </a>
            <a href="#" class="dropdown-item" data-page="stats">
                <span class="dropdown-icon">📊</span>统计
            </a>
            <a href="#" class="dropdown-item" data-page="settings">
                <span class="dropdown-icon">⚙️</span>设置
            </a>
        </div>
        <div class="dropdown-backdrop" id="dropdown-backdrop"></div>

        <!-- ===== 主页面：记账（默认） ===== -->
        <main class="page page-home active" id="page-home">
            <div class="form-container">
                <h2 class="form-title">记一笔支出</h2>

                <!-- 时间 -->
                <div class="field">
                    <label class="field-label">时间</label>
                    <input type="date" class="field-input" id="input-time">
                </div>

                <!-- 类别 -->
                <div class="field">
                    <label class="field-label">类别</label>
                    <div class="select-wrapper">
                        <select class="field-input field-select" id="input-category">
                            <option value="breakfast">🌅 早餐</option>
                            <option value="lunch">☀️ 午餐</option>
                            <option value="dinner">🌙 晚餐</option>
                            <option value="snack">🌃 夜宵</option>
                            <option value="laundry">👕 洗衣</option>
                            <option value="drink">🧃 小饮料</option>
                            <option value="transport">🚌 交通</option>
                            <option value="shopping">🛒 购物</option>
                            <option value="social">🤝 人情</option>
                            <option value="socks" selected>🧦 袜子</option>
                            <option value="other">📦 其他</option>
                        </select>
                        <span class="select-arrow">▾</span>
                    </div>
                </div>

                <!-- 金额 -->
                <div class="field">
                    <label class="field-label">金额</label>
                    <div class="amount-wrapper">
                        <span class="amount-prefix">¥</span>
                        <input type="number" class="field-input amount-input" id="input-amount" placeholder="0.00"
                            step="0.01" min="0" inputmode="decimal">
                    </div>
                </div>

                <!-- 备注 -->
                <div class="field">
                    <label class="field-label">备注</label>
                    <input type="text" class="field-input" id="input-note" placeholder="写点什么…（可选）">
                </div>

                <!-- 提交 -->
                <button class="btn-submit" id="btn-submit">提交</button>

                <!-- 提交成功提示 -->
                <div class="toast" id="toast">✅ 已记录</div>
            </div>
        </main>

        <!-- ===== 历史账目页 ===== -->
        <section class="page page-history" id="page-history">
            <div class="page-inner">
                <div class="history-header">
                    <div class="month-selector">
                        <button class="month-arrow" id="month-prev">‹</button>
                        <span class="month-label" id="month-label">2026年3月</span>
                        <button class="month-arrow" id="month-next">›</button>
                    </div>
                    <div class="month-total">
                        本月支出 <strong id="month-total-amount">¥ 0.00</strong>
                    </div>
                </div>
                <!-- 动态渲染 -->
                <div class="record-list" id="record-list">
                    <div class="empty-state" id="empty-history">📭 这个月还没有账目，去记一笔吧</div>
                </div>
            </div>
        </section>

        <!-- ===== 统计页 ===== -->
        <section class="page page-stats" id="page-stats">
            <div class="page-inner">
                <div class="month-selector" style="margin-bottom: 20px;">
                    <button class="month-arrow" id="stats-month-prev">‹</button>
                    <span class="month-label" id="stats-month-label">2026年3月</span>
                    <button class="month-arrow" id="stats-month-next">›</button>
                </div>

                <div class="stats-tabs">
                    <button class="stats-tab active" data-tab="category">按类别</button>
                    <button class="stats-tab" data-tab="daily">按天</button>
                </div>

                <!-- 类别统计 -->
                <div class="stats-panel active" id="stats-category">
                    <div class="stats-total">
                        <span class="stats-total-label">本月总支出</span>
                        <span class="stats-total-amount" id="stats-total-category">¥ 0.00</span>
                    </div>
                    <div class="pie-chart" id="pie-chart">
                        <div class="pie-center">无数据</div>
                    </div>
                    <div class="category-list" id="category-stats-list">
                        <div class="empty-state">📭 暂无数据</div>
                    </div>
                </div>

                <!-- 每日统计 -->
                <div class="stats-panel" id="stats-daily">
                    <div class="stats-total">
                        <span class="stats-total-label">本月总支出</span>
                        <span class="stats-total-amount" id="stats-total-daily">¥ 0.00</span>
                    </div>
                    <div class="daily-list" id="daily-stats-list">
                        <div class="empty-state">📭 暂无数据</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ===== 设置页 ===== -->
        <section class="page page-settings" id="page-settings">
            <div class="page-inner">
                <div class="settings-group">
                    <h3 class="settings-title">数据管理</h3>
                    <div class="settings-item" id="btn-export"><span>📤</span><span>导出数据 (CSV)</span><span
                            class="arrow">›</span></div>
                    <div class="settings-item" id="btn-clear-data"><span>🗑️</span><span>清空所有数据</span><span
                            class="arrow">›</span></div>
                </div>
                <div class="settings-group">
                    <h3 class="settings-title">关于</h3>
                    <div class="settings-item"><span>📱</span><span>版本</span><span class="settings-val">1.0.0</span>
                    </div>
                    <div class="settings-item"><span>💾</span><span>存储方式</span><span class="settings-val">浏览器本地存储</span>
                    </div>
                    <div class="settings-item"><span>📊</span><span>已记录</span><span class="settings-val"
                            id="record-count">0 条</span></div>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        // 注册 Service Worker（PWA 离线支持）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => { });
        }
    </script>
</body>

</html>
